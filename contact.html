<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹프로그래밍 데모</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- 여기는 메뉴 입니다. -->
    <nav class="navbar"> <!-- 네비 바 -->
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="/about.html">About</a>
            <!-- a.href 입력-->
          </li>
          <li>
            <a href="/contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </nav>
    <script>
          // 페이지 로드 시 저장된 색상 적용
          window.onload = function() {
          const savedColor = localStorage.getItem("themeColor");
          if (savedColor) {
          document.body.style.backgroundColor = savedColor;
          }
        };
    </script>
    <!--메인 섹션-->
    <section class="main">
      <div class="container">
        <h1>연락처</h1>
        <p>멍멍대학교 강아지학과 아무개</p>
        <p>보호자 : 장주민</p>
        <p>전화   : 010-1234-5678</p>
        <p>이메일 : abc@email.com</p>
        <img class="right-image" src="dog.jpeg" alt="user" />

        <p>현재시간: <span id="time"></span></p>
        
        <br />
        <div>
          <img id="fig" height="200px" />
          <p id="desc"></p>
        </div>
      </div>
    </section>

    <script src="main.js"></script> <!-- main.js 파일 연결 -->
  </body>
</html>
  </body>
</html>

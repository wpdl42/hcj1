<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹프로그래밍 데모</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- 여기는 메뉴 입니다. -->
    <nav class="navbar">
      <!-- 네비 바 -->
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="/about.html">About</a>
            <!-- a.href 입력-->
          </li>
          <li>
            <a href="/contact.html">Contact</a>
          </li>
        </ul>
      </div>
      <script>
        // 페이지 로드 시 저장된 색상 적용
        window.onload = function () {
          const savedColor = localStorage.getItem('themeColor')
          if (savedColor) {
            document.body.style.backgroundColor = savedColor
          }
        }
      </script>
    </nav>
    <!--메인 섹션-->
    <style>
      h2 {
        font-size: 2.5em;
        font-weight: bold;
        transition: color 0.4s ease; /* 색상 변경 시 부드럽게 */
      }
    </style>

    <section class="main">
      <div class="container">
        <h1>About 소개</h1>
        <p>웹 프로그래밍 배우는 중 입니다.</p>
        <p>이것은 웹 프로그래밍 수업의 데모 페이지입니다.</p>
        <br />
        <hr />
        <h2 id="rainbowText">새로운 기능 NEW!!</h2>
        <p>*custom color 기능이 추가되었습니다.</p>
        <p>*다른 페이지에서 배경색이 유지됩니다.</p>
        <hr />
        <br />

        <p>현재시간: <span id="time"></span></p>
        <script>
          const rainbowText = document.getElementById('rainbowText')

          // 무지개 색상 배열
          const rainbowColors = [
            'red',
            'orange',
            'green',
            'blue',
            'indigo',
            'violet',
          ]
          let index = 0

          function changeColor() {
            rainbowText.style.color = rainbowColors[index]
            index = (index + 1) % rainbowColors.length // 끝까지 가면 다시 처음으로
          }

          // 3초마다 색상 변경
          setInterval(changeColor, 400)
        </script>

        <br />
        <div>
          <img id="fig" height="200px" />
          <p id="desc"></p>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
    <!-- main.js 파일 연결 -->
  </body>
</html>

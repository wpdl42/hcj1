<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹프로그래밍 데모</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- 여기는 메뉴 입니다. -->
    <nav class="navbar">
      <!-- 네비 바 -->
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="/about.html">About</a>
            <!-- a.href 입력-->
          </li>
          <li>
            <a href="/contact.html">Contact</a>
          </li>
          <li>
            <a href="/Update.html">Update</a>
          </li>
          <li>
            <a href="/login.html">Login</a>
          </li>
        </ul>
      </div>
      <script>
        // 페이지 로드 시 저장된 색상 적용
        window.onload = function () {
          const savedColor = localStorage.getItem('themeColor')
          if (savedColor) {
            document.body.style.backgroundColor = savedColor
          }
        }
      </script>
    </nav>
    <!--메인 섹션-->
    <style>
      h2 {
        font-size: 2.5em;
        font-weight: bold;
        background: linear-gradient(
          90deg,
          red,
          orange,
          yellow,
          green,
          blue,
          indigo,
          violet,
          red,
          orange,
          yellow
        );
        background-size: 400% 100%; /* 배경을 넓게 잡아 자연스럽게 */
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: rainbowScroll 5s linear infinite;
      }

      @keyframes rainbowScroll {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }
    </style>

    <section class="main">
      <div class="container">
        <h1>About 소개</h1>
        <p>웹 프로그래밍 배우는 중 입니다.</p>
        <p>이것은 웹 프로그래밍 수업의 데모 페이지입니다.</p>
        <hr />
        <br />
        <p>배경음악이 현재 페이지에서 재생됩니다.</p>
        <p>아래에 TEST 영상이 있습니다.</p>
        <iframe
          src="SiGanP.html"
          width="100%"
          height="600px"
          style="border: none"
        ></iframe>
        <br />
        <hr />
        <!--여기 있는 것들 업데이트 메뉴 만들어서 옮기기-->
        <h2 id="rainbowText">추가 대기</h2>
        <ol>
          <li style="text-decoration: line-through">test</li>
          <li>비어있음</li>
        </ol>

        <hr />
        <br />

        <p>현재시간: <span id="time"></span></p>

        <br />
        <div>
          <audio src="사도OST.mp3" autoplay></audio>
          <!-- 오디오 삽입 -->

          <video width="320" height="240" controls autoplay loop>
            <!-- 비디오 삽입 -->
            <source src="mediaTest.mp4" type="video/mp4" />
            <!-- 비디오 소스 -->
          </video>
          <img id="fig" height="200px" />
          <p id="desc"></p>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
    <!-- main.js 파일 연결 -->
  </body>
</html>

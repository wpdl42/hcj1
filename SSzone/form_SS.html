<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>입력 받기</h2>
    <form action="">
      <fieldset>
        <legend>로그인</legend>

        <label for="user-id">아이디(6자이상)</label>
        <br />
        <input
          type="text"
          id="user-id"
          size="50"
          value=""
          maxlength="20"
          placeholder="아이디를 입력해주세요"
        />
        <!-- placeholder 속성은 입력 필드에 대한 힌트 텍스트를 제공 
        -->
        <!-- value 속성은 입력 필드의 초기값을 설정 -->
        <br />
        <label for="user-pw">비밀번호</label>
        <br />
        <input type="password" id="user-pw" size="50" />
        <br />
        <br />
        <input type="submit" value="로그인" />
      </fieldset>
      <fieldset>
        <legend>배송정보</legend>
        Search :
        <input type="search" name="" id="" /> <br />
        URL :
        <input type="url" name="" id="" /><br />
        Email :
        <input type="email" name="" id="" /><br />
        Tel :
        <input type="tel" name="" id="" />
      </fieldset>
    </form>

    <label for="w3review">Review of W3Schools:</label>

    <textarea id="w3review" name="w3review" rows="4" cols="50">
기본적으로 적혀있는 텍스트 입니다. 이곳에 적고싶은 것을 적으세요.
</textarea
    >

    <h2>리셋 버튼</h2>
    <form action="">
      <label for="fname">First name:</label><br />
      <input type="text" id="fname" name="fname" value="John" /><br />
      <label for="lname">Last name:</label><br />
      <input type="text" id="lname" name="lname" value="Doe" /><br /><br />
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>

    <h2>Radio 버튼</h2>
    <p>여러가지 중 하나 선택 가능</p>

    <form>
      <input type="radio" id="html" name="fav_language" value="HTML" checked />
      <!-- input id 와 label for 값을 같도록 연결-->
      <label for="html">HTML</label><br />
      <!--여기서 부터-->
      <input type="radio" id="css" name="fav_language" value="CSS" />
      <label for="css">CSS</label><br />
      <!--여기까지 한 묶음-->
      <input
        type="radio"
        id="javascript"
        name="fav_language"
        value="JavaScript"
      />
      <label for="javascript">JavaScript</label>
      <br />
      <input type="radio" id="ABC" name="fav_language" value="JavaScript" />
      <label for="ABC">ABC</label>
    </form>
    <br />
    <h2>Checkbox 버튼</h2>
    <form>
      <input
        type="checkbox"
        id="vehicle1"
        name="vehicle1"
        value="Bike"
        checked
      />
      <!-- checked 속성은 해당 체크박스가 기본적으로 선택되어 있도록 함 -->
      <label for="vehicle1"> I have a bike</label><br />
      <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" />
      <label for="vehicle2"> I have a car</label><br />
      <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat" />
      <label for="vehicle3"> I have a boat</label>
    </form>

    <h2>버튼</h2>
    <input type="button" onclick="alert('Hello World!')" value="Click Me!" />
    <!-- type="button"은 일반 버튼을 생성하며, onclick 속성은 버튼이 클릭될 때 실행될 JavaScript 코드를 지정 -->

    <button onclick="alert('hi')">Click me</button>

    <h2>Color 입력</h2>
    <form>
      <label for="favcolor">Select your favorite color:</label>
      <input type="color" id="favcolor" name="favcolor" />
    </form>

    <h2>Date 입력</h2>

    <form>
      <label for="birthday">Birthday:</label>
      <input type="date" id="birthday" name="birthday" />
    </form>
    <h2>Date and Time 입력</h2>
    <form>
      <label for="birthdaytime">Birthday (date and time):</label>
      <input type="datetime-local" id="birthdaytime" name="birthdaytime" />
    </form>
    <h2>이메일 입력</h2>
    <form>
      <label for="email">Enter your email:</label>
      <input type="email" id="email" name="email" />
    </form>

    <h2>파일 입력</h2>
    <form>
      <label for="myfile">Select a file:</label>
      <input type="file" id="myfile" name="myfile" />
    </form>

    <h2>숨겨진 입력</h2>
    <form>
      <label for="fname">First name:</label>
      <input type="text" id="fname" name="fname" /><br /><br />
      <input type="hidden" id="custId" name="custId" value="3487" />
      <!-- type="hidden"은 사용자에게 보이지 않는 입력 필드를 생성하며, value 속성은 해당 필드에 저장될 값을 지정 -->
      <input type="submit" value="Submit" />
    </form>

    <h2>월과 년 입력</h2>
    <form>
      <label for="bdaymonth">Birthday (month and year):</label>
      <input type="month" id="bdaymonth" name="bdaymonth" />
    </form>

    <h2>숫자 입력</h2>
    <form>
      <label for="quantity">Quantity (between 1 and 5):</label>
      <input
        type="number"
        id="quantity"
        name="quantity"
        min="1"
        max="5"
        disabled
      />
      <!-- disabled 속성은 해당 입력 필드를 비활성화하여 사용자가 입력할 수 없도록 함 -->
    </form>

    <h2>숫자 입력 (스텝과 기본값)</h2>
    <form>
      <label for="quantity">Quantity:</label>
      <input
        type="number"
        id="quantity"
        name="quantity"
        min="0"
        max="100"
        step="10"
        value="30"
      />
    </form>
    <h2>범위 입력</h2>
    <form>
      <label for="vol">Volume (between 0 and 50):</label>
      <input type="range" id="vol" name="vol" min="0" max="50" />
    </form>
    <h2>검색 입력</h2>
    <form>
      <label for="gsearch">Search Google:</label>
      <input type="search" id="gsearch" name="gsearch" />
    </form>
    <h2>전화번호 입력</h2>
    <form>
      <label for="phone">Enter your phone number:</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"
      />
    </form>
    <h2>시간 입력</h2>
    <form>
      <label for="appt">Select a time:</label>
      <input type="time" id="appt" name="appt" />
    </form>
    <h2>URL 입력</h2>
    <form>
      <label for="homepage">Add your homepage:</label>
      <input type="url" id="homepage" name="homepage" />
    </form>

    <h2>주와 년 입력</h2>
    <form>
      <label for="week">Select a week:</label>
      <input type="week" id="week" name="week" />
    </form>

    <h2>드롭다운 리스트</h2>
    <form>
      <label for="cars">Choose a car:</label>

      <select name="cars" id="cars" multiple>
        <!-- multiple 속성은 사용자가 여러 옵션을 선택할 수 있도록 함 -->
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="mercedes">Mercedes</option>
        <option value="audi">Audi</option>
      </select>
    </form>
  </body>
</html>

<!--
    <label for="user-id">아이디(6자이상)</label></label> 
    label 요소는 입력 필드에 대한 설명을 제공하며, for 속성은 해당 입력 필드의 id와 일치해야 함
<input type="text" id="user-id" />
input 요소는 사용자로부터 데이터를 입력받는 필드이며, type 속성은 입력 유형을 지정 + user-id 로 연결해줬기에 위 아이디(6자이상) 을 클릭하면 자동으로 포커스가 이동함

<label>아이디(6자이상) <input type="text" /> </label>
        


-->

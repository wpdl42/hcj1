<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <img src="mediaTest.png" alt="이미지 테스트" />
    <!-- 이미지 삽입 -->
    <audio src="mediaTest.mp4" autoplay></audio>
    <!-- 오디오 삽입 -->
    <video width="320" height="240" controls autoplay loop>
      <!-- 비디오 삽입 -->
      <source src="mediaTest.mp4" type="video/mp4" />
      <!-- 비디오 소스 -->
    </video>
  </body>
</html>

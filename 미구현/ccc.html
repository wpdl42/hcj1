<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>드롭다운 메뉴 예제</title>
    <style>
      /* 기본 메뉴 스타일 */
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        position: relative;
        display: inline-block;
        margin-right: 20px;
      }
      a {
        text-decoration: none;
        padding: 10px 15px;
        display: block;
        background: #3498db;
        color: white;
      }
      a:hover {
        background: #2980b9;
      }

      /* 하위 메뉴 기본 숨김 */
      .submenu {
        display: none;
        position: absolute;
        top: 100%; /* 부모 메뉴 바로 아래 */
        left: 0;
        background: #ecf0f1;
        min-width: 150px;
        border: 1px solid #ccc;
      }
      .submenu li {
        display: block;
      }
      .submenu a {
        background: #ecf0f1;
        color: #333;
      }
      .submenu a:hover {
        background: #bdc3c7;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>
        <a href="#">메뉴 1</a>
        <ul class="submenu">
          <li><a href="#">하위 메뉴 1-1</a></li>
          <li><a href="#">하위 메뉴 1-2</a></li>
          <li><a href="#">하위 메뉴 1-3</a></li>
        </ul>
      </li>
      <li><a href="#">메뉴 2</a></li>
      <li><a href="#">메뉴 3</a></li>
    </ul>

    <script>
      // 모든 상위 메뉴에 이벤트 추가
      document.querySelectorAll('li').forEach(function (item) {
        item.addEventListener('mouseenter', function () {
          let submenu = item.querySelector('.submenu')
          if (submenu) submenu.style.display = 'block'
        })
        item.addEventListener('mouseleave', function () {
          let submenu = item.querySelector('.submenu')
          if (submenu) submenu.style.display = 'none'
        })
      })
    </script>
  </body>
</html>
